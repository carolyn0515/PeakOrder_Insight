project: peakorder-insight
environment: dev
aws_region: ap-northeast-2

storage:
  raw_bucket: ""
  lakehouse_bucket: ""
  paimon_warehouse: "s3://your-lakehouse-bucket/paimon"

tables:
  orders_latest: "paimon.default.orders_latest"
  order_items_latest: "paimon.default.order_items_latest"
  product_demand_daily: "paimon.default.product_demand_daily"
  store_order_pressure_hourly: "paimon.default.store_order_pressure_hourly"
  peak_order_alerts: "paimon.default.peak_order_alerts"

generation:
  base_orders_per_hour: 1000
  peak_multiplier: 8
  expected_total_events: 48330
  expected_peak_events: 32000

jobs:
  paimon_spark_package: "org.apache.paimon:paimon-spark-3.5:1.0.1"
  bootstrap_tables_entry_point: "s3://your-lakehouse-bucket/jobs/bootstrap_tables.py"
  load_order_events_entry_point: "s3://your-lakehouse-bucket/jobs/load_order_events.py"
  validate_order_events_entry_point: "s3://your-lakehouse-bucket/jobs/validate_order_events.py"
  detect_peak_pressure_entry_point: "s3://your-lakehouse-bucket/jobs/detect_peak_pressure.py"
  peak_pressure_threshold: 2.5
  peak_min_orders: 20
  export_dashboard_views_entry_point: "s3://your-lakehouse-bucket/jobs/export_dashboard_views.py"
  dashboard_export_prefix: "s3://your-lakehouse-bucket/exports/dashboard"
  max_order_event_error_ratio: 0.0
  raw_order_events_input: "s3://your-raw-bucket/orders/"
